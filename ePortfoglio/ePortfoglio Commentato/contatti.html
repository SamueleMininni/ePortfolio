<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">SM</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#menu"
        style="border-color: var(--oro);">
        <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="competenze.html">Competenze</a></li>
          <li class="nav-item"><a class="nav-link" href="progetti.html">Progetti</a></li>
          <li class="nav-item"><a class="nav-link" href="istruzione.html">Istruzione</a></li>
          <li class="nav-item"><a class="nav-link" href="contatti.html">Contatti</a></li>
        </ul>
      </div>
    </div>
  </nav>

  
  <section class="hero-pagina">
    <div class="container">
      <h1>Contatti</h1>
    </div>
  </section>


  <section style="background-color: #111; padding: 60px 0;">
    <div class="container">

      <!-- "riquadro": bordo oro, sfondo scuro, angoli arrotondati (stile in style.css) -->
      <div class="riquadro">

        <!-- row g-5: griglia a 2 colonne con spazio abbondante tra di loro -->
        <div class="row g-5">

          <!-- ---- Colonna sinistra: form di contatto (occupa 7/12 dello schermo su PC) ---- -->
          <div class="col-lg-7">

            <!-- mb-3: margin-bottom 3 = spazio sotto ogni campo -->
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input type="text" class="form-control" placeholder="Il tuo nome">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              
              <input type="email" class="form-control" placeholder="tua@email.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Messaggio</label>
              
              <textarea class="form-control" rows="5" placeholder="Scrivi qui..."></textarea>
            </div>

            
            <button class="btn btn-oro">Invia messaggio</button>
          </div>
          <div class="col-lg-5">
            <h5 style="color:var(--oro); margin-bottom:20px;">Trovami anche qui</h5>
            <p>📧 samuelemininni@gmail.com</p>
            <p>📍 Bari, Italia</p>

            <!-- d-flex gap-3: mette i link in riga con spazio tra di loro
                 I link puntano ai profili social reali -->
            <div class="mt-3 d-flex gap-3">
              <a href="https://github.com/samuelemininni" style="color:var(--oro);">GitHub</a>
              <a href="#" style="color:var(--oro);">LinkedIn</a>
              <a href="https://Instagram.com/samuelemininni_" style="color:var(--oro);">Instagram</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  
  <footer>
    <p>© 2026 Samuele Mininni — Realizzato con Bootstrap 5</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
